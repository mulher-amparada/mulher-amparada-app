<style>
/* ========== RESET PREMIUM ========== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Quicksand', sans-serif;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ========== LAYOUT BASE ========== */
.section{
  position:relative;
  min-height:100vh;
  padding:80px 18px;

  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  opacity:0;
  transform:translateY(50px);
  transition:.7s cubic-bezier(.22,.61,.36,1);

  overflow:hidden;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

.container{
  width:100%;
  max-width:520px;
}

/* ========== TEXTOS ========== */
h1{
  font-size:clamp(28px,6vw,44px);
  color:#ff4fa3;
  margin-bottom:14px;
  font-weight:800;
}

h2{
  font-size:22px;
  margin:15px 0;
  color:#fff;
}

p{
  color:#cfcfcf;
  font-size:15px;
  line-height:1.7;
  margin:10px auto;
  max-width:600px;
}

/* título dinâmico */
.dynamic-title{
  font-size:26px;
  font-weight:800;
  transition:.3s;
}

/* ========== LABELS ========== */
.label{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#ffffff88;
  font-weight:700;
  margin:30px 0 15px;
}

/* ========== SHAPES ========== */
.shape{
  position:absolute;
  opacity:.08;
  pointer-events:none;
}

.circle{
  width:220px;
  height:220px;
  border:2px solid #ff4fa3;
  border-radius:50%;
  top:10%;
  right:10%;
  animation:spin 25s linear infinite;
}

.line{
  width:280px;
  height:2px;
  background:#ff4fa3;
  bottom:15%;
  left:-100px;
  animation:moveLine 8s ease-in-out infinite alternate;
}

.triangle{
  width:0;
  height:0;
  border-left:60px solid transparent;
  border-right:60px solid transparent;
  border-bottom:100px solid #ff4fa3;
  top:55%;
  left:65%;
  animation:float 6s ease-in-out infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes moveLine{to{transform:translateX(120px);}}
@keyframes float{50%{transform:translateY(-20px);}}

/* ========== WARNING CARD ========== */


/* ========== BOTÃO DOWNLOAD ========== */
.btn-download{
  display:inline-block;
  width:100%;
  max-width:360px;

  padding:16px 22px;
  margin:20px auto;

  border-radius:999px;
  background:linear-gradient(135deg,#ff4fa3,#ff1e85);
  color:#fff;

  font-weight:800;
  text-align:center;
  text-decoration:none;

  position:relative;
  overflow:hidden;

  box-shadow:0 12px 30px rgba(255,77,166,.35);

  transition:.25s ease;
}

.btn-download:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 45px rgba(255,77,166,.5);
}

.btn-download:active{
  transform:scale(.97);
}

/* brilho */
.btn-download::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:120%;
  height:100%;

  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.3),
    transparent
  );

  transform:skewX(-15deg);
}

.btn-download:hover::before{
  animation:shine .8s ease forwards;
}

@keyframes shine{
  to{left:120%;}
}

/* ========== GLASS CARD ========== */
.box-form{
  width:100%;
  max-width:360px;

  margin:30px auto;
  padding:20px;

  border-radius:20px;
  background:rgba(18,18,18,.55);
  border:1px solid rgba(255,255,255,.1);

  backdrop-filter:blur(12px);

  text-align:center;

  box-shadow:0 12px 35px rgba(0,0,0,.5);

  transition:.3s ease;
}

.box-form:hover{
  transform:translateY(-4px);
}

/* ========== BOTÃO SECUNDÁRIO ========== */
.btn-secondary{
  width:100%;
  padding:14px 18px;

  border-radius:999px;
  border:1px solid rgba(255,255,255,.15);

  background:lightpink;
  color:#fff;

  font-weight:600;
  cursor:pointer;

  transition:.25s ease;
}

.btn-secondary:hover{
  transform:scale(1.03);
  border-color:#ff4fa3;
}

.btn-secondary:active{
  transform:scale(.97);
}

/* ========== GALERIA ========== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;
  margin-top:20px;
}

img{
  width:100%;
  border-radius:16px;
  border:2px solid rgba(255,255,255,.08);
  transition:.3s;
}

img:hover{
  transform:scale(1.03);
}

/* ========== FOOTER ========== */
.footer{
  margin-top:25px;
  text-align:center;
  color:#8ad1ff;
  font-size:13px;
}

/* ========== TOGGLE (NÃO MEXIDO VISUALMENTE) ========== */
.toggle{
  width:min(420px,90%);
  height:68px;

  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);

  border-radius:999px;
  padding:6px;

  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(14px);
  z-index:999;
}

.alavanca{
  width:50%;
  height:100%;
  border-radius:999px;

  background:linear-gradient(135deg,#ff4fa3,#a855f7);

  display:flex;
  align-items:center;
  justify-content:center;

  transition:.35s cubic-bezier(.22,.61,.36,1);
}

/* ========== ANIMAÇÃO SCROLL ========== */
.section.show{
  opacity:1;
  transform:translateY(0);
}

svg {
width: 28px;
height: 28px;
}

.pill{
  display:inline-block;
  padding:12px 22px;

  border-radius:999px;

  color: pink;
  font-weight:600;

  background:rgba(255,255,255,0.08);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);

  transition:.3s ease;
}

.pill:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.12);
}
</style>

<script>
// ================= SECTIONS (SCROLL) =================
const sections = document.querySelectorAll('.section');

function mostrar() {
    const trigger = window.innerHeight * 0.85;

    sections.forEach(sec => {
        if (sec.getBoundingClientRect().top < trigger) {
            sec.classList.add('show');
        }
    });
}

window.addEventListener('scroll', mostrar);
window.addEventListener('load', mostrar);


// ================= TOGGLE =================
const toggle = document.getElementById("puxador");
const alavanca = document.getElementById("puxar");
const icon1 = document.querySelector(".icon1");
const icon2 = document.querySelector(".icon2");
const section1 = document.getElementById("section1");

let paginaAtual = window.location.pathname.split("/").pop();

// 🔥 começa na opção 2 (true) ou 1 (false)
let ligado = true;

// aplica estado visual
function aplicarEstado() {
  if (ligado) {
    alavanca.style.transform = "translateX(100%)";
    icon1.style.display = "none";
    icon2.style.display = "block";

    // mostra section1
    if (section1) section1.classList.add("active");

  } else {
    alavanca.style.transform = "translateX(0)";
    icon1.style.display = "block";
    icon2.style.display = "none";

    // esconde section1
    if (section1) section1.classList.remove("active");
  }
}

// aplica ao carregar
aplicarEstado();

// clique
toggle.onclick = () => {
  ligado = !ligado;

  aplicarEstado();

  document.body.style.transition = "opacity 0.3s ease";
  sections.forEach(sec => {
  sec.style.opacity = "0";
});

  setTimeout(() => {
    if (paginaAtual === "index.html" || paginaAtual === "") {
      window.location.href = "index1.html";
    } else {
      window.location.href = "index.html";
    }
  }, 300);
};

</script>
