<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Quicksand',sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

button,
a,
div,
img{
    outline:none;
}

body{
    background:#000;
    color:#fff;
    min-height:100vh;
    padding:28px 20px 40px;
}

/* topo */

.top{
    display:flex;
    justify-content:flex-end;
    gap:20px;
    margin-bottom:40px;
}

.top svg{
    width:25px;
    height:25px;
    stroke:#fff;
}

/* título */

.section-title{
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
}

/* botão eu */

.eu-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    background:#111;
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
    margin-bottom:30px;
    border:1px solid rgba(255,255,255,.08);
}

.eu-btn:hover{
    background:#1a1a1a;
}

/* grid */

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
}

/* cards */

.card{
    position:relative;
    overflow:hidden;
    background:none;
    aspect-ratio:1/1;
    cursor:pointer;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:.25s;
}

.card:hover img{
    transform:scale(1.03);
}

.card p{
    position:absolute;
    bottom:10px;
    left:10px;
    font-size:14px;
    font-weight:600;
    background:rgba(0,0,0,.5);
    padding:6px 10px;
    border-radius:10px;
}

/* responsivo */

@media(max-width:500px){

    .section-title{
        font-size:24px;
    }

}

p {
color: pink;
}

svg {
width: 28px;
height: 28px;
}
</style>
</head>

<body>

<!-- topo -->

<div class="top">

    <!-- nuvem -->

    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M12 21V11M12 11L9 14M12 11L15 14M7 16.8184C4.69636 16.2074 3 14.1246 3 11.6493C3 9.20008 4.8 6.9375 7.5 6.5C8.34694 4.48637 10.3514 3 12.6893 3C15.684 3 18.1317 5.32251 18.3 8.25C19.8893 8.94488 21 10.6503 21 12.4969C21 14.8148 19.25 16.7236 17 16.9725" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>

    <!-- pesquisa -->

    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M18.5 18.5L22 22" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"></path> <path d="M6.75 3.27093C8.14732 2.46262 9.76964 2 11.5 2C16.7467 2 21 6.25329 21 11.5C21 16.7467 16.7467 21 11.5 21C6.25329 21 2 16.7467 2 11.5C2 9.76964 2.46262 8.14732 3.27093 6.75" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"></path> </g></svg>

    <!-- menu -->

    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4 6H20M4 12H20M4 18H20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>

</div>

<!-- título -->

<div class="section-title">
    Nosso hub feito para você!
</div>

<!-- botão -->

<button class="eu-btn"
onclick="window.location.href='eu1.html'">
    Ir para a pagina: Sobre mim.
</button>

<!-- grid -->

<div class="grid">

    <!-- 1 -->

    <div class="card"
    onclick="window.location.href='a.html'">

        <img src="icon1.svg">

        <p>Sobre o projeto</p>

    </div>

    <!-- 2 -->

    <div class="card"
    onclick="window.location.href='print.html'">

        <img src="icon2.svg">

<p>Prints do app</p>

    </div>

    <!-- 3 -->

    <div class="card"
    onclick="window.location.href='final.html'">

        <img src="icon3.svg">

<p>Dia oficial da versão final do app</p>

    </div>

    <!-- 4 -->

    <div class="card"
    onclick="window.location.href='nome.html'">

        <img src="icon4.svg">

<p>Nome verdadeiro do projeto</p>

    </div>

    <!-- 5 -->

    <div class="card"
    onclick="window.location.href='codigo.html'">

        <img src="icon5.svg">

<p>Código usado para fazer o app</p>
    </div>

    <!-- 6 -->

  

</div>

</body>
</html>
